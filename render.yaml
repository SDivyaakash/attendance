services:
  - type: web
    name: rollcall-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_HOST
        fromService:
          name: rollcall-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME

  - type: web
    name: rollcall-frontend
    runtime: static
    rootDir: frontend
    buildCommand: >
      echo "VITE_API_URL=https://${BACKEND_HOST}/api" > .env.production && npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: BACKEND_HOST
        fromService:
          name: rollcall-backend
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
